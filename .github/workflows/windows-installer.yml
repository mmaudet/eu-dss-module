name: Windows installer (MSI)

on:
  workflow_dispatch:
  push:
    tags: ['v*']

jobs:
  build-msi:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Build agent jar
        run: mvn -B -f pom.xml -pl eu-dss-agent -am -DskipTests package
      - name: Ensure WiX on PATH (preinstalled on windows runners; install only if missing)
        shell: pwsh
        run: |
          $wix = Get-ChildItem 'C:\Program Files (x86)' -Directory -Filter 'WiX Toolset*' -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($wix) {
            $bin = Join-Path $wix.FullName 'bin'
            Add-Content -Path $env:GITHUB_PATH -Value $bin
            Write-Host "WiX bin added to PATH: $bin"
          } else {
            choco install wixtoolset -y --no-progress
          }
      - name: Build MSI (jpackage)
        shell: pwsh
        run: ./packaging/windows/build-agent-msi.ps1
      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: eu-dss-agent-msi
          path: dist/*.msi
          if-no-files-found: error
