name: Tauri app (unsigned)

# Builds the EU-DSS Sign desktop client (eu-dss-ui) for the three desktop OSes.
# UNSIGNED for now: artifacts are downloadable from the run's "Artifacts" section but
# will trip Gatekeeper (macOS) / SmartScreen (Windows) on other machines. Code signing
# is scaffolded below (commented) and will be enabled once the certs/credentials land:
#   - macOS:   Developer ID Application "Linagora (KUT463DS29)" + notarization (app-specific pw)
#   - Windows: Azure Trusted Signing
#   - Linux:   no signing required (.deb / .AppImage / .rpm)

on:
  workflow_dispatch:
  push:
    branches: [feat/ui-refonte]
    paths:
      - 'eu-dss-ui/**'
      - '.github/workflows/tauri-app.yml'

permissions:
  contents: read

concurrency:
  group: tauri-app-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest   # macOS Apple Silicon (arm64) — Intel (macos-13) intentionally dropped
            label: macOS (arm64)
          - platform: ubuntu-22.04   # webkit2gtk-4.1 lives in 22.04 apt
            label: Linux (x86_64)
          - platform: windows-latest
            label: Windows (x86_64)
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Tauri 2 Linux system dependencies (not pre-installed by tauri-action).
      # rpm = for the .rpm bundle target; patchelf = for the AppImage target.
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libssl-dev \
            libxdo-dev \
            build-essential \
            curl wget file \
            patchelf \
            rpm

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: eu-dss-ui/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: eu-dss-ui/src-tauri -> target

      - name: Install frontend dependencies
        working-directory: eu-dss-ui
        run: npm ci

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Build + stage embedded backend (Unix)
        if: runner.os != 'Windows'
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          mvn -B -f pom.xml -pl eu-dss-server -am -DskipTests package
          JAR_DIR="$(mktemp -d)"
          OUT_DIR="$(mktemp -d)"
          cp eu-dss-server/target/eu-dss-server-0.1.0-SNAPSHOT.jar "$JAR_DIR/"
          DEST="eu-dss-ui/src-tauri/resources/eu-dss-server"
          mkdir -p "$DEST"
          if [ "$RUNNER_OS" = "macOS" ]; then
            # The embedded JRE binaries (launcher + all .dylib + jspawnhelper) must be
            # Developer-ID + hardened-runtime signed, or the outer .app fails notarization.
            # Import the cert into a temp keychain and let jpackage sign the whole app-image.
            KEYCHAIN="$RUNNER_TEMP/eudss-jpackage.keychain-db"
            KCPASS="$(openssl rand -base64 18)"
            security create-keychain -p "$KCPASS" "$KEYCHAIN"
            security set-keychain-settings -lut 21600 "$KEYCHAIN"
            security unlock-keychain -p "$KCPASS" "$KEYCHAIN"
            echo "$APPLE_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/eudss-cert.p12"
            security import "$RUNNER_TEMP/eudss-cert.p12" -P "$APPLE_CERTIFICATE_PASSWORD" -k "$KEYCHAIN" -T /usr/bin/codesign -T /usr/bin/jpackage
            security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KCPASS" "$KEYCHAIN" >/dev/null
            security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed 's/"//g')
            "$JAVA_HOME/bin/jpackage" \
              --type app-image --name eu-dss-server --app-version 1.0.0 --vendor LINAGORA \
              --input "$JAR_DIR" --main-jar eu-dss-server-0.1.0-SNAPSHOT.jar --dest "$OUT_DIR" \
              --mac-sign --mac-signing-key-user-name "Linagora (KUT463DS29)"
            cp -R "$OUT_DIR/eu-dss-server.app/Contents" "$DEST/Contents"
            codesign -dvvv "$DEST/Contents/MacOS/eu-dss-server" 2>&1 | grep -iE "Authority|Runtime" | head -3 || true
          else
            "$JAVA_HOME/bin/jpackage" \
              --type app-image --name eu-dss-server --app-version 1.0.0 --vendor LINAGORA \
              --input "$JAR_DIR" --main-jar eu-dss-server-0.1.0-SNAPSHOT.jar --dest "$OUT_DIR"
            cp -R "$OUT_DIR/eu-dss-server/." "$DEST/"
          fi
          ls -la "$DEST"

      - name: Build + stage embedded backend (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          mvn -B -f pom.xml -pl eu-dss-server -am -DskipTests package
          $jarDir = New-TemporaryFile | ForEach-Object { Remove-Item $_; New-Item -ItemType Directory -Path $_ }
          $outDir = New-TemporaryFile | ForEach-Object { Remove-Item $_; New-Item -ItemType Directory -Path $_ }
          Copy-Item eu-dss-server\target\eu-dss-server-0.1.0-SNAPSHOT.jar $jarDir\
          & "$env:JAVA_HOME\bin\jpackage.exe" `
            --type app-image `
            --name eu-dss-server `
            --app-version 1.0.0 `
            --vendor LINAGORA `
            --input "$jarDir" `
            --main-jar eu-dss-server-0.1.0-SNAPSHOT.jar `
            --dest "$outDir"
          $dest = "eu-dss-ui\src-tauri\resources\eu-dss-server"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          Copy-Item -Recurse -Force "$outDir\eu-dss-server\*" $dest
          Get-ChildItem $dest

      - name: Build Tauri app (unsigned)
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: eu-dss-ui
        env:
          # Backend URL baked in at build time. Falls back to the in-app localhost
          # default when the repo variable is unset (fine for unsigned test artifacts).
          VITE_BACKEND_URL: ${{ vars.VITE_BACKEND_URL }}
          # ── macOS code signing + notarization (Developer ID; tauri-action applies these only on macOS) ──
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}            # base64 of the Developer ID .p12
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: "Developer ID Application: Linagora (KUT463DS29)"
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}                  # app-specific password (notarization)
          APPLE_TEAM_ID: KUT463DS29

      # tauri-action notarizes + staples the .app, but not the .dmg container itself.
      # Notarize + staple the .dmg so the downloaded disk image is also Gatekeeper-clean.
      - name: Notarize + staple the macOS .dmg
        if: runner.os == 'macOS'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: KUT463DS29
        run: |
          set -euo pipefail
          DMG="$(find eu-dss-ui/src-tauri/target -path '*/release/bundle/dmg/*.dmg' | head -1)"
          if [ -z "$DMG" ]; then echo "::error::no .dmg found to notarize"; exit 1; fi
          echo "Notarizing: $DMG"
          xcrun notarytool submit "$DMG" --apple-id "$APPLE_ID" --password "$APPLE_PASSWORD" --team-id "$APPLE_TEAM_ID" --wait
          xcrun stapler staple "$DMG"
          xcrun stapler validate "$DMG"
          spctl -a -t open --context context:primary-signature -vv "$DMG" || true

      # ── Windows code signing via Azure Artifact Signing (formerly Trusted Signing) ──
      # Signs the produced .msi/.exe with the Linagora cert profile before upload.
      - name: Sign Windows artifacts (Azure Artifact Signing)
        if: runner.os == 'Windows'
        uses: azure/artifact-signing-action@v2
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ secrets.AZURE_SIGNING_ENDPOINT }}
          signing-account-name: ${{ secrets.AZURE_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ secrets.AZURE_CERT_PROFILE }}
          files-folder: eu-dss-ui/src-tauri/target/release/bundle
          files-folder-filter: msi,exe
          files-folder-recurse: true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: eudss-${{ matrix.platform }}
          if-no-files-found: error
          path: |
            eu-dss-ui/src-tauri/target/**/release/bundle/**/*.dmg
            eu-dss-ui/src-tauri/target/**/release/bundle/**/*.deb
            eu-dss-ui/src-tauri/target/**/release/bundle/**/*.AppImage
            eu-dss-ui/src-tauri/target/**/release/bundle/**/*.rpm
            eu-dss-ui/src-tauri/target/**/release/bundle/**/*.msi
            eu-dss-ui/src-tauri/target/**/release/bundle/**/*.exe
