<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- brand gradient: matches CSS brand gradient, 135deg #3A6DF0 to #5B4FE0 -->
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3A6DF0"/>
      <stop offset="1" stop-color="#5B4FE0"/>
    </linearGradient>
    <!-- soft drop shadow for a native macOS app-icon look -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="26" flood-color="#16215C" flood-opacity="0.30"/>
    </filter>
  </defs>

  <!-- rounded-square body (Apple icon-grid: ~824px in a 1024 canvas) -->
  <rect x="100" y="96" width="824" height="824" rx="185" ry="185" fill="url(#grad)" filter="url(#shadow)"/>

  <!-- EU-DSS Sign mark: shield + validation check (from the in-app brand glyph, bolded) -->
  <g transform="translate(512 512) scale(24) translate(-12 -11.65)">
    <path d="M12 2.6 5 5.4v5.3c0 4.3 2.9 8.2 7 9.4 4.1-1.2 7-5.1 7-9.4V5.4L12 2.6Z"
          fill="#ffffff" fill-opacity="0.95"/>
    <path d="m9.2 12.1 1.9 1.9 3.8-3.9"
          fill="none" stroke="#3A6DF0" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
